version: '3.8'

services:
  # ===========================================================================
  # API Gateway - NGINX
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: hog-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - auth-service
      - member-service
      - ride-service
      - meeting-service
      - ai-service
    networks:
      - hog-network
    restart: unless-stopped

  # ===========================================================================
  # Frontend - React Application
  # ===========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hog-frontend
    environment:
      - VITE_API_URL=/api
      - VITE_APP_NAME=${CHAPTER_NAME:-HOG Chapter Manager}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - hog-network
    restart: unless-stopped

  # ===========================================================================
  # Auth Service - Authentication & Authorization
  # ===========================================================================
  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: hog-auth-service
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=4001
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-chaptermanager}
      - POSTGRES_USER=${POSTGRES_USER:-chaptermanager}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-30d}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - FACEBOOK_APP_ID=${FACEBOOK_APP_ID}
      - FACEBOOK_APP_SECRET=${FACEBOOK_APP_SECRET}
      - APP_URL=${APP_URL:-http://localhost:3000}
    volumes:
      - ./services/auth:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    networks:
      - hog-network
    restart: unless-stopped

  # ===========================================================================
  # Member Service - Membership Management
  # ===========================================================================
  member-service:
    build:
      context: ./services/member
      dockerfile: Dockerfile
    container_name: hog-member-service
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=4002
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-chaptermanager}
      - POSTGRES_USER=${POSTGRES_USER:-chaptermanager}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - JWT_SECRET=${JWT_SECRET}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET:-chaptermanager}
    volumes:
      - ./services/member:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - hog-network
    restart: unless-stopped

  # ===========================================================================
  # Ride Service - Ride Planning & Tracking
  # ===========================================================================
  ride-service:
    build:
      context: ./services/ride
      dockerfile: Dockerfile
    container_name: hog-ride-service
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=4003
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-chaptermanager}
      - POSTGRES_USER=${POSTGRES_USER:-chaptermanager}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - JWT_SECRET=${JWT_SECRET}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./services/ride:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    networks:
      - hog-network
    restart: unless-stopped

  # ===========================================================================
  # Meeting Service - Meetings & Minutes
  # ===========================================================================
  meeting-service:
    build:
      context: ./services/meeting
      dockerfile: Dockerfile
    container_name: hog-meeting-service
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=4004
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-chaptermanager}
      - POSTGRES_USER=${POSTGRES_USER:-chaptermanager}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - JWT_SECRET=${JWT_SECRET}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./services/meeting:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    networks:
      - hog-network
    restart: unless-stopped

  # ===========================================================================
  # AI Service - AI-Powered Features
  # ===========================================================================
  ai-service:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    container_name: hog-ai-service
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=4005
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-chaptermanager}
      - POSTGRES_USER=${POSTGRES_USER:-chaptermanager}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - JWT_SECRET=${JWT_SECRET}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
    volumes:
      - ./services/ai:/app
    depends_on:
      - postgres
      - redis
    networks:
      - hog-network
    restart: unless-stopped

  # ===========================================================================
  # PostgreSQL Database
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: hog-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-chaptermanager}
      - POSTGRES_USER=${POSTGRES_USER:-chaptermanager}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - hog-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chaptermanager}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Redis Cache
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: hog-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - hog-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # MinIO Object Storage
  # ===========================================================================
  minio:
    image: minio/minio:latest
    container_name: hog-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - hog-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

# =============================================================================
# Networks
# =============================================================================
networks:
  hog-network:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
  redis_data:
  minio_data:
